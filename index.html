<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Earn Passive Income</title>
    <style>
        /* Modern UI Styling */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .card {
            width: 90%;
            max-width: 400px;
            background: #1e293b;
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
            border: 1px solid #334155;
            text-align: center;
        }

        .icon {
            font-size: 3rem;
            margin-bottom: 1rem;
            display: block;
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
            color: #38bdf8;
        }

        p {
            color: #94a3b8;
            font-size: 0.9rem;
            margin-bottom: 2rem;
            line-height: 1.5;
        }

        /* Form Styling */
        .input-group {
            text-align: left;
            margin-bottom: 1.2rem;
        }

        label {
            display: block;
            font-size: 0.75rem;
            font-weight: 700;
            margin-bottom: 0.4rem;
            color: #cbd5e1;
            text-transform: uppercase;
        }

        input, select {
            width: 100%;
            padding: 0.8rem;
            background: #0f172a;
            border: 1px solid #475569;
            border-radius: 8px;
            color: white;
            font-size: 1rem;
            box-sizing: border-box;
        }

        input:focus {
            outline: 2px solid #38bdf8;
            border-color: transparent;
        }

        /* The "Money" Button */
        .cta-button {
            width: 100%;
            background: linear-gradient(135deg, #38bdf8 0%, #0ea5e9 100%);
            color: #0f172a;
            border: none;
            padding: 1.2rem;
            font-size: 1rem;
            font-weight: 800;
            border-radius: 12px;
            cursor: pointer;
            text-transform: uppercase;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 1rem;
        }

        .cta-button:hover {
            transform: scale(1.02);
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.4);
        }

        .bonus-tag {
            display: inline-block;
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: #4ade80;
            background: rgba(74, 222, 128, 0.1);
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
        }
    </style>
</head>
<body>

    <div class="card">
        <span class="icon">📺</span>
        <h1>Watch & Earn</h1>
        <p>Complete your profile to start making money by watching videos and playing games.</p>

        <form action="https://www.jumptask.io/r/duborynefami" method="GET">
            
            <div class="input-group">
                <label>Full Name</label>
                <input type="text" placeholder="Your Name" required>
            </div>

            <div style="display: flex; gap: 10px;">
                <div class="input-group" style="flex: 1;">
                    <label>Age</label>
                    <input type="number" placeholder="18" min="13" required>
                </div>
                <div class="input-group" style="flex: 1;">
                    <label>Gender</label>
                    <select required>
                        <option value="">Select</option>
                        <option value="m">Male</option>
                        <option value="f">Female</option>
                        <option value="o">Other</option>
                    </select>
                </div>
            </div>

            <button type="submit" class="cta-button">
                I want to make money now
            </button>

        </form>

        <div class="bonus-tag">
            🎁 +10% Bonus on your first task!
        </div>
    </div>

</body>
</html>
